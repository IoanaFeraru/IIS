# IIS-SparkSQL-Service — application.properties

server.port=9990
server.servlet.context-path=/IIS-SparkSQL-Service

# Disable persistent sessions (stateless REST)
server.servlet.session.persistent=false

# Credentials for /_sqlrest/** endpoints and java_method() callback
spring.security.user.name=spark
spring.security.user.password=sql

# Thrift Server port — DBeaver connects here
spark.thrift.port=10000

#Memory settings
spark.driver.memory=3g
spark.executor.memory=2g

# When called from DBeaver/Spark SQL, the static createJSONViewFromREST posts
# back to this service. Inside Docker this must be the container's own address.
# Override via env var: SPARK_REST_CALLBACK_URL
# Default (local dev): http://localhost:9990/IIS-SparkSQL-Service
# Docker (container name): http://iis-spark-sql:9990/IIS-SparkSQL-Service
spark.rest.callback.url=http://localhost:9990/IIS-SparkSQL-Service

logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} %-5level [%thread] %logger{36} - %msg%n
logging.level.root=WARN
logging.level.org.spark.service=INFO
logging.level.org.springframework.security=WARN
# Suppress verbose Spark/Hive startup noise
logging.level.org.apache.spark=WARN
logging.level.org.apache.hadoop=ERROR
logging.level.org.apache.hive=WARN

# Spark manages its own session; we must not let Spring Boot create a DataSource
spring.autoconfigure.exclude=\
  org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration,\
  org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration

spring.jackson.serialization.indent-output=true
spring.jackson.default-property-inclusion=non_null

