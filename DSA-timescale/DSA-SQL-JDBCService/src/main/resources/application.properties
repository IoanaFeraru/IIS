### REST Data HTTP service
server.port=8090
server.servlet.context-path=/DSA-SQL-PostgreSQL/rest

### JDBC Data Source
jdbc.data.source.DB_URL=jdbc:postgresql://localhost/iis_db
jdbc.data.source.USER=iis_user
jdbc.data.source.PASS=iis_pass
## jdbc.data.source.JDBC_DRIVER

# logging
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} %-5level %logger{36} - %msg%n
logging.level.org.hibernate.SQL=debug


# keep it the same
# SpringBoot Security
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.SecurityAutoConfiguration
spring.security.user.name=developer
spring.security.user.password=iis
